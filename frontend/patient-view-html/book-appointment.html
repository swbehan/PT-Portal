<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Cabin:ital,wght@0,400..700;1,400..700&family=Diplomata&family=Lexend+Deca:wght@100..900&family=Oswald:wght@200..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link href="../css/global.css" rel="stylesheet" />
    <link href="../css/about.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/pt-view/availability.css" />
    <link rel="stylesheet" href="../css/patient-view/book-appointments.css" />
    <meta
      name="description"
      content="booking appointments page for the patient that allows the user to select from available time slots listed by a PT from PT Portal"
    />
    <meta name="author" content="Sean Behan, Julian Leonhardt" />
    <title>Availability</title>
    <link rel="icon" type="image/svg+xml" href="../images/favicon.svg" />
  </head>
  <body>
    <header class="heading">
      <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
          <a class="navbar-brand">PT Portal</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link active" href="book-appointment.html"
                  >Appointments</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="plans.html">My Plan</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="write-a-review.html"
                  >Write a Review</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link sign-out" href="/index.html">Sign Out</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <main>
      <article class="book-appointment px-5">
        <div class="toast-container position-fixed top-0 end-0 p-3">
          <div id="successToast" class="toast" role="alert">
            <div class="toast-header">
              <strong class="me-auto">PT Portal</strong>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="toast"
              ></button>
            </div>
            <div class="toast-body">Appointment Successfully Booked</div>
          </div>
        </div>
        <h2>Book an Appointment</h2>
        <section class="row gx-5 align-items-center">
          <div class="col-6">
            <img
              class="persona-img"
              src="https://media.istockphoto.com/id/484692236/photo/active-african-american-man-running.jpg?s=612x612&w=0&k=20&c=6TZP-_CPc9sXMVhP3xE1prt_O5gPlgX0fgrW5-T64Pw="
              alt="PT helping a patient with exercises"
            />
          </div>
          <div class="col-6">
            <form id="book-appointment-form">
              <div class="row gy-4">
                <div class="col-12">
                  <label for="pt-select"
                    >Which physical therapist would you like to see?</label
                  >
                  <select class="form-select" id="pt-select" name="pt">
                    <option value="">Select</option>
                  </select>
                </div>
                <div class="col-12">
                  <label for="date-select">Current Date Availability</label>
                  <select
                    class="form-select"
                    id="date-select"
                    name="date"
                    disabled
                  >
                    <option value="">Select a PT first</option>
                  </select>
                </div>
                <div class="col-12">
                  <label for="location-input">Location</label>
                  <input
                    type="text"
                    class="form-control"
                    id="location-select"
                    name="location"
                    placeholder="Location will auto fill"
                    readonly
                    disabled
                  />
                </div>
                <div class="col-12">
                  <button type="submit" class="btn submit-btn">Book</button>
                </div>
              </div>
            </form>
          </div>
        </section>
      </article>
      <article class="availability-booked px-5">
        <h2>Appointments Booked</h2>
        <section class="booked-schedule"></section>
      </article>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script
      src="../js/patient-view/book-appointments.js"
      type="module"
    ></script>
  </body>
</html>
