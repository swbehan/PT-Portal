<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Cabin:ital,wght@0,400..700;1,400..700&family=Diplomata&family=Lexend+Deca:wght@100..900&family=Oswald:wght@200..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link href="../css/global.css" rel="stylesheet" />
    <link href="../css/about.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/pt-view/availability.css">
    <meta
      name="description"
      content="availability page for the physical therapist that allows the user to create new availability time slots, see existing ones that are booked and not currently booked"
    />
    <meta name="author" content="Sean Behan, Julian Leonhardt" />
    <title>Availability</title>
  </head>
  <body>
    <header class="heading">
      <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
          <a class="navbar-brand">PT Portal</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent"
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
              <li class="nav-item">
                <a class="nav-link" aria-current="page" href=""
                  >Patient Reviews</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link active" href="availability.html"
                  >Availability</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="">Plans</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <main>
      <article class="set-availability px-5">
        <h2>List Your Availability</h2>
        <section class="row gx-5 align-items-center">
          <div class="col-6">
            <img
              class="persona-img"
              src="https://www.verywellhealth.com/thmb/NUgKHRfhe_QBwf32D4XCt6PIheQ=/1500x0/filters:no_upscale():max_bytes(150000):strip_icc()/VWH-GettyImages-1501185786-bd44c624acaa48058f140b46c11bdc26.jpg"
              alt="PT helping a patient with exercises"
            />
          </div>
          <form id="availability-form" class="col-6">
            <div class="row gy-3">
              <div class="col-12">
                <label for="date">Date Available</label>
                <input type="date" id="date" class="form-control" name="date" />
              </div>
              <div class="col-12">
                <label for="time">Time Available</label>
                <input type="time" id="time" class="form-control" name="time" />
                <span>All appointments have a duration of 45 minutes</span>
              </div>
              <div class="col-12">
                <label for="location">Location</label>
                <input
                  type="text"
                  id="location"
                  class="form-control"
                  name="location"
                  placeholder="Location"
                />
              </div>
              <div class="col-12">
                <button type="submit" class="btn submit-btn">Submit</button>
              </div>
            </div>
          </form>
        </section>
      </article>
    </main>
    <script src="../js/frontend.js"></script>
  </body>
</html>
